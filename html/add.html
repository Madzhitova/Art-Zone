    <h1>Добавить новый курс</h1>

    <div class="form">

        <label>Название курса:</label>
        <input id="title" placeholder="Введите название">

        <label>Категория:</label>
        <input id="category" placeholder="Например: Digital">

        <label>Фото:</label>
        <input type="file" id="image" accept="image/*">

        <label>Видео:</label>
        <input type="file" id="video" accept="video/*">

        <label>Описание:</label>
        <textarea id="text" placeholder="Описание"></textarea>

        <div class="buttons">
            <button class="save" onclick="save()">Сохранить</button>
            <button class="cancel" onclick="goBack()">Отмена</button>
        </div>
