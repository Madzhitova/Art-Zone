        <h2>Добавить новый курс</h2>
        <form id="courseForm" style="max-width:500px; margin-top:30px;">

            <input type="text" id="title" name="title" placeholder="Введите название" style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px; border:1px solid #ccc;"><br>

            <label for="category">Категория:</label><br>
            <input type="text" id="category" name="category" placeholder="Например: Digital" style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px; border:1px solid #ccc;"><br>

            <label for="link">Ссылка на курс:</label><br>
            <input type="text" id="link" name="link" placeholder="https://..." style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px; border:1px solid #ccc;"><br>

            <div style="margin-top:20px;">
                <button type="submit" class="btn" style="margin-right:15px;">Сохранить</button>
                <button type="button" class="btn" onclick="location.href='index.html'" style="background:#7c5cff;">Отмена</button>
            </div>
        </form>
